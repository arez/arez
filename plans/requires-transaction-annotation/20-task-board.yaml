  - id: T01
    title: Add `@RequiresTransaction` public API and release metadata
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - `arez.annotations.RequiresTransaction` exists with final Javadocs.
      - `TransactionMode` and `TrackingMode` exist as top-level enums in `arez.annotations`.
      - `CHANGELOG.md` documents the user-visible addition.
      - API compatibility metadata is updated for the next release.
    files_touched:
      - core/src/main/java/arez/annotations/*
      - api-test/*
      - CHANGELOG.md
      - plans/requires-transaction-annotation/*
    evidence:
      - command: implemented public API, changelog entry, and api-test metadata
        result: pass
        note: Added `@RequiresTransaction`, `TransactionMode`, `TrackingMode`, `CHANGELOG.md` entry, and `api-test/0.243-0.244.json`.
    commit:
      hash: not_required
      message: Add RequiresTransaction annotation API

  - id: T02
    title: Parse and validate `@RequiresTransaction` targets in the processor
    status: completed
    priority: high
    depends_on:
      - T01
    acceptance_criteria:
      - The processor discovers `@RequiresTransaction` during compilation.
      - A dedicated descriptor or equivalent explicit representation exists for `@RequiresTransaction` methods.
      - Invalid targets fail for placement, accessibility, overridability, and mutual-exclusion violations.
      - `@RequiresTransaction` is added to the component non-empty recognized-element list.
      - `@RequiresTransaction` is explicitly ignored by the unnecessary-`allowEmpty` warning check and related diagnostics.
      - A single shared detector or equivalent complete source of truth defines which Arez method annotations conflict with `@RequiresTransaction`.
      - `@ArezComponent` and `@ArezComponentLike` container rules match existing Arez conventions.
    files_touched:
      - processor/src/main/java/arez/processor/*
      - plans/requires-transaction-annotation/*
    evidence:
      - command: bundle exec buildr clean arez:processor:test
        result: pass
        note: Processor discovers `@RequiresTransaction`, enforces exclusivity/placement/accessibility rules, counts it for non-empty validation, and ignores it for unnecessary-`allowEmpty` warnings.
    commit:
      hash: not_required
      message: Add RequiresTransaction processor validation

  - id: T03
    title: Generate runtime transaction precondition wrappers and diagnostics
    status: completed
    priority: high
    depends_on:
      - T02
    acceptance_criteria:
      - Generated methods assert an active transaction before invoking user code.
      - Generated methods validate `TransactionMode` and `TrackingMode` constraints when configured.
      - Runtime checks are gated consistently with Arez invariant policy.
      - Diagnostics distinguish missing transaction, wrong mode, and wrong tracking state.
      - New runtime failures allocate/update Arez-style message codes and `core/src/test/java/arez/diagnostic_messages.json`.
      - No new transaction is created by the generated wrapper.
    files_touched:
      - processor/src/main/java/arez/processor/*
      - core/src/main/java/arez/*
      - core/src/test/java/arez/diagnostic_messages.json
      - plans/requires-transaction-annotation/*
    evidence:
      - command: bundle exec buildr arez:core:test
        result: pass
        note: Added invariant-backed runtime diagnostics 0229-0231 and registered them in `diagnostic_messages.json` plus generated diagnostic coverage.
    commit:
      hash: not_required
      message: Generate RequiresTransaction runtime checks

  - id: T04
    title: Add processor fixtures and generated-source expectations
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Successful fixtures include a component whose only recognized Arez methods are `@RequiresTransaction` methods.
      - Warning fixtures prove `@ArezComponent(allowEmpty = true)` with only `@RequiresTransaction` methods does not emit the unnecessary-`allowEmpty` warning.
      - Successful fixtures cover default, mode-constrained, and tracking-constrained usage.
      - Successful fixtures cover inherited methods and interface default methods separately.
      - Negative fixtures cover invalid target shapes, invalid container usage, and every conflicting Arez method annotation from the shared detector/list.
      - Expected generated-source fixtures assert check ordering and selected runtime helper usage.
      - Processor test assertions cover the new diagnostics.
    files_touched:
      - processor/src/test/java/arez/processor/ArezProcessorTest.java
      - processor/src/test/fixtures/**
      - plans/requires-transaction-annotation/*
    evidence:
      - command: bundle exec buildr clean arez:processor:test
        result: pass
        note: Added success, warning, inherited/default-method, conflict, misplaced-annotation, and package-access fixtures plus expected generated-source coverage.
      - command: follow-up review of `@RequiresTransaction` conflict handling
        result: accepted_feedback
        note: Accepted the feedback that future workflow runs must distinguish shared-detector validation from exhaustive fixture coverage. The processor already enforces exclusivity centrally via `verifyNoDuplicateAnnotations()` and `METHOD_ANNOTATIONS`; the workflow skill was updated so exhaustive claims are only used when backed by exhaustive or source-derived tests.
    commit:
      hash: not_required
      message: Add RequiresTransaction processor fixtures

  - id: T05
    title: Add core and integration coverage for runtime behavior
    status: completed
    priority: high
    depends_on:
      - T03
    acceptance_criteria:
      - Tests cover success inside matching transactions.
      - Tests cover failure outside a transaction.
      - Tests cover mode mismatch and tracking mismatch.
      - Tests cover behavior when transaction-type enforcement is disabled.
      - Tests assert that `@RequiresTransaction` emits no action or transaction spy events of its own.
      - Tests assert exact runtime diagnostic messages/codes for the new failure paths.
      - Tests cover inherited-method dispatch and interface-default-method dispatch separately.
    files_touched:
      - core/src/test/java/**
      - integration-tests/src/test/java/**
      - plans/requires-transaction-annotation/*
    evidence:
      - command: bundle exec buildr arez:integration-tests:test
        result: pass
        note: Added runtime/integration coverage for missing transaction, mode mismatch, tracking mismatch, relaxed transaction-type enforcement, no extra spy events, and inherited/default-method dispatch.
    commit:
      hash: not_required
      message: Add RequiresTransaction runtime coverage

  - id: T06
    title: Document `@RequiresTransaction` and add doc-examples
    status: completed
    priority: medium
    depends_on:
