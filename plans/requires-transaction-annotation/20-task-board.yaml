      - command: second review pass
        result: updated_plan_pending_rereview
        note: Refined the processor rule so `@RequiresTransaction` counts for component non-empty validation but is ignored for unnecessary-`allowEmpty` warnings, and added explicit warning-path coverage requirements.
      - command: user approval in-thread
