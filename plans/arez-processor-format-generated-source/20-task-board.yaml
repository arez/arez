    title: Add formatter dependencies, shading, and test JVM exports
    status: completed
    priority: high
    depends_on:
      - PLAN-APPROVAL
    acceptance_criteria:
      - Formatter and SPI artifacts are pinned to 2.92.0 in build metadata.
      - Full non-optional runtime closure listed in requirements is available to the processor and shaded into the processor jar.
      - "`jackson-datatype-guava:2.21.1` is included for the formatter SPI closure."
      - "`jsr305` is excluded from the packaged shaded processor jar rather than broad-relocating `javax.annotation`."
      - Relocation rules cover every package listed in requirements.
      - "Required JDK module exports are configured only for `arez:processor` tests and processor IPR TestNG configuration."
      - "`bundle exec buildr arez:processor:compile` succeeds."
      - "`bundle exec buildr arez:processor:package` succeeds."
      - Packaged jar contains relocated formatter classes, relocated `jackson-datatype-guava`, and no unrelocated formatter package.
      - "Packaged jar does not contain `arez/processor/vendor/javax/annotation/processing`."
    files_touched:
      - build.yaml
      - buildfile
    evidence:
      - command: bundle exec buildr arez:processor:compile
        result: "PASS; processor compile completed successfully."
      - command: bundle exec buildr arez:processor:package
        result: "PASS; processor tests passed 1138/1138 and packaged target/arez_processor/arez-processor-0.247.jar."
      - command: "bundle exec ruby -e \"require 'zip'; jar='target/arez_processor/arez-processor-0.247.jar'; ...\""
        result: "PASS; jar contained relocated formatter classes and relocated jackson-datatype-guava, no unrelocated com/palantir/javaformat package, no arez/processor/vendor/javax/annotation/processing, and no Java 21 multi-release entries."
    commit:
      hash: not_required
      message: Not committed by user instruction.

  - id: T2-PROCESSOR-OPTION
    title: Implement opt-in formatted emission in ArezProcessor
    status: completed
    priority: high
    depends_on:
      - T1-BUILD-DEPS
    acceptance_criteria:
      - "`@SupportedOptions` includes `arez.format_generated_source`."
      - Default behavior remains unformatted.
      - Enabled behavior formats generated source before Filer write.
      - Formatter failures produce clear processor errors.
      - "Formatted write path mirrors JavaPoet 0.14.0 `JavaFile.writeTo(Filer)` filename, originating-element, writer-close, and delete-on-failure behavior."
    files_touched:
      - processor/src/main/java/arez/processor/ArezProcessor.java
      - processor/src/main/java/arez/processor/Constants.java
    evidence:
      - command: bundle exec buildr arez:processor:compile
        result: "PASS; @SupportedOptions and formatter references compiled."
      - command: bundle exec buildr arez:processor:test
        result: "PASS; processor tests passed 1138/1138, including formatted-output and no-export diagnostic coverage."
      - command: "javac ... -processorpath target/arez_processor/arez-processor-0.247.jar -Aarez.format_generated_source=true ..."
        result: "PASS; isolated formatted processorpath smoke generated output matching expectedFormatted/com/example/action/Arez_BasicActionModel.java."
    commit:
      hash: not_required
      message: Not committed by user instruction.

  - id: T3-FIXTURE-TESTS
    title: Add dual-run successful compile assertions and formatted fixtures
    status: completed
    priority: high
    depends_on:
      - T2-PROCESSOR-OPTION
    acceptance_criteria:
      - "All successful fixture-comparison call sites in `ArezProcessorTest` use an Arez-local helper rather than final Proton `assertSuccessfulCompile(...)` overloads."
      - "Arez successful fixture comparisons run once against `expected` and once against `expectedFormatted`."
      - "Fixture regeneration writes both directories when `arez.output_fixture_data=true`."
      - Existing warning/failure diagnostic tests are not expanded unnecessarily.
      - "`processor/src/test/fixtures/expectedFormatted` is generated and committed."
      - "A no-export subprocess compile with `-Aarez.format_generated_source=true` asserts a diagnostic mentioning `arez.format_generated_source` and required exports."
      - "`bundle exec buildr arez:processor:test` succeeds."
    files_touched:
      - processor/src/test/java/arez/processor/ArezProcessorTest.java
      - processor/src/test/fixtures/expectedFormatted/**
      - buildfile
    evidence:
      - command: JAVA_TOOL_OPTIONS=-Darez.output_fixture_data=true bundle exec buildr arez:processor:test
        result: "PASS; regenerated fixture data and produced 505 formatted expected fixtures."
      - command: bundle exec buildr arez:processor:test
        result: "PASS; core tests passed 823/823 and processor tests passed 1138/1138."
      - command: "bundle exec buildr help arez:processor:test"
        result: "Earlier accidental test invocation failed with 463 missing expectedFormatted comparisons before fixture regeneration, confirming the dual-run helper was active."
    commit:
      hash: not_required
      message: Not committed by user instruction.

  - id: T4-DOCS-CHANGELOG
