    status: completed
    priority: medium
    depends_on:
      - T2-PROCESSOR-OPTION
    acceptance_criteria:
      - "`CHANGELOG.md` Unreleased section mentions the new option."
      - "`docs/project_setup.md` documents the option, default, exact JDK export flags, and where the flags must be supplied."
      - Documentation matches implemented behavior.
