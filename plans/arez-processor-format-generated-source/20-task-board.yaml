      - Focused processor tests pass after all changes.
      - Packaged processor jar is inspected for relocated formatter classes.
      - "Isolated `javac` smoke using only packaged processor jar on `-processorpath`, `-Aarez.format_generated_source=true`, and required JDK exports passes."
      - Isolated smoke verifies a generated source file is formatted.
      - "Full gate `bundle exec buildr ci J2CL=no` passes or any blocker is recorded with evidence."
      - Task board evidence is updated.
      - "Completed tasks have commit metadata or `not_required` as appropriate."
